spring:
  # DB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true   # TODO: 최초 배포 성공 후 제거
    baseline-version: 1         # TODO: 최초 배포 성공 후 제거

  # JPA
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
        provider:
          google:
            issuer-uri: https://accounts.google.com

# JWT
jwt:
  secret:
    key: ${JWT_KEY}
    accessExpire: 1800000
    refreshExpire: 60480000

admin:
  signup-key: ${ADMIN_SIGNUP_KEY}

logging:
  level:
    root: info

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  info:
    env:
      enabled: true

info:
  app:
    name: TheOne
    version: 1.0.0
    description: TheOne Bottle Shop V1 API
